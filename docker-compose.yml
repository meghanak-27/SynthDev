version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devops_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: devops_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devops_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: devops_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/devops_platform
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_DIR=/app/chromadb_storage
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for code sandboxing
      - backend_chromadb:/app/chromadb_storage
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: devops_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - WDS_SOCKET_PORT=0 # Avoid Webpack dev websocket conflicts in container environment

volumes:
  postgres_data:
  backend_chromadb:
